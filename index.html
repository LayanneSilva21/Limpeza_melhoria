<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Limpeza Pro</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #ffc107; --danger: #dc3545; --dark: #343a40; --purple: #6f42c1; --teal: #20c997; --info: #17a2b8; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2, h3 { text-align: center; color: var(--dark); margin-top: 0; }
        .secao { display: none; }
        .ativa { display: block; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { cursor: pointer; border: none; font-weight: bold; transition: 0.3s; color: white; }
        button:disabled { background: #ccc !important; cursor: not-allowed; opacity: 0.7; }
        .btn-main { background: var(--primary); }
        .btn-danger { background: var(--danger); }
        .btn-teal { background: var(--teal); }
        
        .tabela-wrapper { width: 100%; max-height: 480px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; margin-top: 15px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; min-width: 700px; }
        thead th { position: sticky; top: 0; background: #f8f9fa; z-index: 10; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; color: var(--dark); }
        td { padding: 12px; border-top: 1px solid #f1f1f1; border-bottom: 1px solid #f1f1f1; font-size: 16px; vertical-align: middle; background: white; }
        
        .linha-pendente td:first-child { border-left: 6px solid #f6e05e; border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
        .linha-andamento td:first-child { border-left: 6px solid var(--info); border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
        .linha-concluido td:first-child { border-left: 6px solid #48bb78; border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
        td:last-child { border-right: 1px solid #f1f1f1; border-top-right-radius: 8px; border-bottom-right-radius: 8px; }

        .status-tag { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; white-space: nowrap; border: 1px solid rgba(0,0,0,0.05); }
        
        .aba-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; }
        .aba { padding: 10px 20px; background: #e9ecef; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 14px; color: #333; }
        .aba.ativa { background: var(--primary); color: white; }
        .card { background: #fff; border-left: 5px solid var(--primary); padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .card.concluido { background-color: #f0fff4 !important; border-left-color: var(--success); }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: var(--warning); display: none; z-index: 1000; }
        .admin-box { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 20px; }
        
        .filtros-container { display: flex; gap: 8px; margin: 15px 0; justify-content: center; flex-wrap: wrap; }
        .btn-filter { width: auto; padding: 10px 18px; font-size: 14px; background: #6c757d; border-radius: 8px; }
        .btn-filter.active { background: var(--primary) !important; box-shadow: 0 4px 10px rgba(0,123,255,0.3); }
        
        .admin-timer { display: flex; align-items: center; gap: 4px; color: #718096; font-size: 14px; margin-top: 4px; }
    </style>
</head>
<body>

<div id="loader"></div>

<div class="container">
    <div id="tela-login" class="secao ativa">
        <h2>🔑 Acesso ao Sistema</h2>
        <select id="select-user">
            <option value="admin">Administrador</option>
            <option value="Ana">Ana</option><option value="Beatriz">Beatriz</option><option value="Claudio">Claudio</option>
            <option value="Emilia">Emilia</option><option value="Fabiano">Fabiano</option><option value="Irlana">Irlana</option>
            <option value="Jailma">Jailma</option><option value="Marciana">Marciana</option>
        </select>
        <input type="password" id="senha" placeholder="Senha">
        <button class="btn-main" id="btn-entrar" onclick="fazerLogin()">Entrar</button>
    </div>

    <div id="painel-admin" class="secao">
        <h3>⚙️ Painel de Controle</h3>
        
        <div class="admin-box">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <select id="adm-andar">
                    <option value="Térreo">Térreo</option><option value="1º Andar">1º Andar</option>
                    <option value="2º Andar">2º Andar</option><option value="3º Andar">3º Andar</option>
                    <option value="4º Andar">4º Andar</option><option value="Copa/Refeitório">Copa/Refeitório</option>
                </select>
                <select id="adm-dia">
                    <option>Segunda</option><option>Terça</option><option>Quarta</option>
                    <option>Quinta</option><option>Sexta</option><option>Sábado</option><option>Domingo</option>
                </select>
            </div>
            <input type="text" id="adm-tarefa" placeholder="Descrição da Tarefa">
            <select id="adm-func">
                <option value="Ana">Ana</option><option value="Beatriz">Beatriz</option><option value="Claudio">Claudio</option>
                <option value="Emilia">Emilia</option><option value="Fabiano">Fabiano</option><option value="Irlana">Irlana</option>
                <option value="Jailma">Jailma</option><option value="Marciana">Marciana</option>
            </select>
            <button class="btn-main" id="btn-add-escala" onclick="adicionarTarefa()" style="background: var(--success);">Adicionar na Escala</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom:10px">
            <button class="btn-teal" onclick="reaplicarEscala()">♻️ Nova Semana</button>
            <button class="btn-danger" onclick="limparSemana()">🔄 Resetar Tudo</button>
        </div>

        <hr>

        <div class="filtros-container">
            <button class="btn-filter active" id="filter-todos" onclick="setFiltro('Todos')">Todas</button>
            <button class="btn-filter" id="filter-pendente" onclick="setFiltro('Pendente')">Pendentes</button>
            <button class="btn-filter" id="filter-andamento" onclick="setFiltro('Em andamento')">Em andamento</button>
            <button class="btn-filter" id="filter-concluido" onclick="setFiltro('Concluído')">Concluídas</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
            <select id="filtro-dia-adm" onchange="renderizarAdmin()">
                <option value="Todos">📅 Todos os Dias</option>
                <option>Segunda</option><option>Terça</option><option>Quarta</option>
                <option>Quinta</option><option>Sexta</option><option>Sábado</option><option>Domingo</option>
            </select>
            <select id="filtro-func-adm" onchange="renderizarAdmin()">
                <option value="Todos">👤 Todos Funcionários</option>
                <option>Ana</option><option>Beatriz</option><option>Claudio</option>
                <option>Emilia</option><option>Fabiano</option><option>Irlana</option>
                <option>Jailma</option><option>Marciana</option>
            </select>
        </div>

        <div class="tabela-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Funcionário</th>
                        <th>Tarefa</th>
                        <th>Status</th>
                        <th style="width: 40px;"></th>
                    </tr>
                </thead>
                <tbody id="lista-geral-corpo"></tbody>
            </table>
        </div>
        
        <button style="background:#6c757d; margin-top: 20px;" onclick="location.reload()">Sair</button>
    </div>

    <div id="painel-func" class="secao">
        <h2 id="boas-vindas"></h2>
        <div class="aba-container" id="abas-dias"></div>
        <div id="minhas-tarefas"></div>
        <button style="background:#6c757d" onclick="location.reload()">Sair</button>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbzjhuWFx6ApXnI1eAtA2e2PjoT8kIKUON-_znvzfxI-fvv-0QhlnorKR13bL7od-3W0/exec"; 

    let tarefas = [];
    let listaUsuariosNuvem = [];
    let usuarioLogado = "";
    let diaSelecionado = "Segunda";
    let filtroStatus = "Todos";
    let salvando = false; // Bloqueio contra salvamento duplo
    const dias = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado", "Domingo"];

    function obterData(nomeDia) {
        const hoje = new Date();
        const diasRef = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];
        const indexAlvo = diasRef.indexOf(nomeDia);
        const indexHoje = hoje.getDay();
        const diff = indexAlvo - indexHoje;
        const dataAlvo = new Date(hoje);
        dataAlvo.setDate(hoje.getDate() + diff);
        return `${nomeDia} ${String(dataAlvo.getDate()).padStart(2, '0')}/${String(dataAlvo.getMonth() + 1).padStart(2, '0')}`;
    }

    async function carregarDados() {
        if(salvando) return; // Não recarrega se estiver salvando
        document.getElementById('loader').style.display = 'block';
        try {
            const response = await fetch(URL_API);
            const data = await response.json();
            tarefas = data.tarefas || [];
            listaUsuariosNuvem = data.usuarios || [];
            // Cache local para segurança
            localStorage.setItem('cache_tarefas', JSON.stringify(tarefas));
            
            if (usuarioLogado === 'admin') renderizarAdmin();
            else if (usuarioLogado) renderizarFunc();
        } catch (e) { 
            console.error("Erro ao carregar, usando cache local...");
            const cache = localStorage.getItem('cache_tarefas');
            if(cache) tarefas = JSON.parse(cache);
        }
        document.getElementById('loader').style.display = 'none';
    }

    async function salvar(acao = "save", extra = {}) {
        if (salvando) return; // Impede duplo clique/duplo envio
        salvando = true;
        document.getElementById('loader').style.display = 'block';
        
        // Desabilita botões críticos
        document.querySelectorAll('button').forEach(b => b.disabled = true);

        try {
            await fetch(URL_API, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ action: acao, tarefas: tarefas, ...extra }) 
            });
            
            // Pequeno delay para o Google Scripts processar
            setTimeout(() => {
                salvando = false;
                carregarDados();
                document.querySelectorAll('button').forEach(b => b.disabled = false);
            }, 1000);

        } catch (e) { 
            salvando = false;
            document.querySelectorAll('button').forEach(b => b.disabled = false);
            alert("Erro de conexão. A tarefa será sincronizada ao recarregar.");
            document.getElementById('loader').style.display = 'none';
        }
    }

    function setFiltro(s) {
        filtroStatus = s;
        document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
        if(s === 'Todos') document.getElementById('filter-todos').classList.add('active');
        if(s === 'Pendente') document.getElementById('filter-pendente').classList.add('active');
        if(s === 'Em andamento') document.getElementById('filter-andamento').classList.add('active');
        if(s === 'Concluído') document.getElementById('filter-concluido').classList.add('active');
        renderizarAdmin();
    }

    async function fazerLogin() {
        const user = document.getElementById('select-user').value;
        const pass = document.getElementById('senha').value;
        if(!pass) return alert("Digite a senha!");
        
        document.getElementById('btn-entrar').disabled = true;
        await carregarDados();
        document.getElementById('btn-entrar').disabled = false;

        if (user === 'admin' && pass === '813147') return entrarNoPainel('admin');
        const cadastro = listaUsuariosNuvem.find(u => u.nome === user);
        if (!cadastro) {
            if (confirm("Definir senha inicial para este usuário?")) {
                await salvar("registrar", { usuario: user, novaSenha: pass });
                alert("Senha salva!"); location.reload();
            }
        } else if (cadastro.senha == pass) entrarNoPainel(user);
        else alert("Senha incorreta!");
    }

    function entrarNoPainel(user) {
        usuarioLogado = user;
        document.getElementById('tela-login').classList.remove('ativa');
        if (user === 'admin') {
            document.getElementById('painel-admin').classList.add('ativa');
            renderizarAdmin();
        } else {
            document.getElementById('painel-func').classList.add('ativa');
            document.getElementById('boas-vindas').innerText = `Olá, ${user} 👋, Essas são suas tarefas!`;
            const hojeIndex = new Date().getDay();
            setDia(dias[hojeIndex === 0 ? 6 : hojeIndex - 1]);
        }
    }

    async function adicionarTarefa() {
        const t = document.getElementById('adm-tarefa').value;
        if (!t) return alert("Dê um nome à tarefa!");
        tarefas.push({ id: Date.now(), dia: document.getElementById('adm-dia').value, andar: document.getElementById('adm-andar').value, tarefa: t, usuario: document.getElementById('adm-func').value, status: "Pendente", inicio: "", fim: "", duracao: "", inicioRaw: "" });
        renderizarAdmin(); 
        await salvar();
        document.getElementById('adm-tarefa').value = "";
    }

    function renderizarAdmin() {
        const corpo = document.getElementById('lista-geral-corpo');
        const fDia = document.getElementById('filtro-dia-adm').value;
        const fFunc = document.getElementById('filtro-func-adm').value;

        const filtradas = tarefas.filter(t => {
            const matchStatus = (filtroStatus === 'Todos' || t.status === filtroStatus);
            const matchDia = (fDia === 'Todos' || t.dia === fDia);
            const matchFunc = (fFunc === 'Todos' || t.usuario === fFunc);
            return matchStatus && matchDia && matchFunc;
        });

        corpo.innerHTML = filtradas.map(t => {
            let classeStatus = 'linha-pendente';
            if(t.status === 'Concluído') classeStatus = 'linha-concluido';
            if(t.status === 'Em andamento') classeStatus = 'linha-andamento';
            
            let tempoTxt = "";
            if(t.duracao) {
                const h = Math.floor(t.duracao / 60);
                const m = t.duracao % 60;
                tempoTxt = h > 0 ? `${h}h ${m}min` : `${m}min`;
            }

            return `
            <tr class="${classeStatus}">
                <td><small>${obterData(t.dia)}</small></td>
                <td><strong>${t.usuario}</strong></td>
                <td>
                    <strong>${t.andar}</strong>: ${t.tarefa}
                    ${t.status === 'Concluído' ? `<div class="admin-timer">⏱️ ${tempoTxt}</div>` : ''}
                    ${t.status === 'Em andamento' ? `<div class="admin-timer" style="color:var(--primary)">⚡ Iniciou ${t.inicio}</div>` : ''}
                </td>
                <td>
                    <span class="status-tag" style="background:${t.status==='Concluído'?'#c6f6d5':(t.status==='Em andamento'?'#bee3f8':'#feebc8')}; color:${t.status==='Concluído'?'#22543d':(t.status==='Em andamento'?'#2c5282':'#744210')}">
                        ${t.status}
                    </span>
                </td>
                <td>
                    <button onclick="removerTarefa(${t.id})" style="background:none; color:#999; width:auto; padding:0">🗑️</button>
                </td>
            </tr>`;
        }).join('');
    }
    function falarTarefa(texto) {
    if ('speechSynthesis' in window) {
        // Cancela qualquer fala anterior para não sobrepor vozes
        window.speechSynthesis.cancel();
        
        const mensagem = new SpeechSynthesisUtterance(texto);
        mensagem.lang = 'pt-BR'; // Define o idioma para Português
        mensagem.rate = 0.9;    // Velocidade um pouco mais lenta para facilitar o entendimento
        window.speechSynthesis.speak(mensagem);
    } else {
        alert("Seu navegador não suporta leitura de voz.");
    }
}

    function renderizarFunc() {
        const abas = document.getElementById('abas-dias');
        abas.innerHTML = dias.map(d => `<div class="aba ${d === diaSelecionado ? 'ativa' : ''}" onclick="setDia('${d}')">${d}</div>`).join('');
        const filtradas = tarefas.filter(t => t.usuario === usuarioLogado && t.dia === diaSelecionado);
        document.getElementById('minhas-tarefas').innerHTML = filtradas.length ? filtradas.map(t => `
    <div class="card ${t.status === 'Concluído' ? 'concluido' : ''}">
        <div style="flex: 1;">
            <span style="font-size:11px; color:#718096">${obterData(t.dia)}</span><br>
            <strong>${t.andar}</strong><br><small>${t.tarefa}</small>
            ${t.duracao ? `<br><small style="color:var(--success)">Duração: ${t.duracao} min</small>` : ''}
        </div>
        
        <div style="margin-right: 10px;">
            <button onclick="falarTarefa('${t.andar}. ${t.tarefa}')" 
                    style="background: var(--primary); width: 45px; height: 45px; border-radius: 50%; padding: 0; display: flex; align-items: center; justify-content: center;">
                🔊
            </button>
        </div>

        <div>
            ${t.status === 'Concluído' ? '✅' : `<button style="background:${t.inicio?'var(--success)':'var(--warning)'}; width:auto; padding:8px 15px" onclick="acaoTarefa(${t.id}, '${t.inicio?'stop':'start'}')">${t.inicio?'Fim':'Início'}</button>`}
        </div>
    </div>`).join('') : "<p style='text-align:center'>Nenhuma tarefa para este dia.</p>";
    }
    async function acaoTarefa(id, tipo) {
        if(salvando) return;
        const t = tarefas.find(x => x.id == id);
        const agora = new Date();
        const hora = agora.getHours().toString().padStart(2, '0') + ":" + agora.getMinutes().toString().padStart(2, '0');
        
        if (tipo === 'start') { 
            t.inicio = hora; 
            t.inicioRaw = agora.getTime(); 
            t.status = "Em andamento"; 
        } else { 
            t.fim = hora; 
            t.duracao = Math.floor((agora.getTime() - t.inicioRaw) / 60000); 
            t.status = "Concluído"; 
        }
        
        renderizarFunc(); 
        await salvar();
    }

    async function removerTarefa(id) {
    // 1. Confirmação para evitar erros
    if (!confirm("Deseja excluir apenas esta cópia da tarefa?")) return;

    // 2. Remove APENAS o item com esse ID da lista visual (no navegador)
    // Isso evita que tarefas com nomes iguais sumam juntas
    tarefas = tarefas.filter(t => t.id != id);

    // 3. Atualiza o que você vê na tela imediatamente
    renderizarAdmin();

    // 4. Avisa a planilha para deletar apenas aquela linha específica
    try {
        await fetch(URL_API, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ 
                action: "delete_single", 
                idExcluir: id 
            })
        });
        console.log("Tarefa excluída da planilha.");
    } catch (error) {
        console.error("Erro ao excluir na planilha:", error);
        alert("Erro ao sincronizar exclusão. Recarregue a página.");
    }
}
    async function limparSemana() { if(confirm("Apagar TUDO definitivamente?")) { tarefas = []; renderizarAdmin(); await salvar("clear"); } }
    async function reaplicarEscala() { if(confirm("Resetar status e manter tarefas para a próxima semana?")) { await salvar("arquivar"); tarefas = tarefas.map(t => ({ ...t, status: "Pendente", inicio: "", fim: "", duracao: "", inicioRaw: "" })); renderizarAdmin(); await salvar(); } }
    function setDia(d) { diaSelecionado = d; renderizarFunc(); }
    
    // Inicialização
    carregarDados();
</script>
</body>
</html>
